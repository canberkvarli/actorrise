<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="margin:0; padding:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:15px; line-height:1.7; color:#1a1a1a;">
    <div style="max-width:540px; margin:0 auto; padding:32px 20px;">
        {% block content %}{% endblock %}

        {% if unsubscribe_url %}
        <p style="margin-top:32px; font-size:12px; color:#999;"><a href="{{ unsubscribe_url }}" style="color:#999;">Unsubscribe</a></p>
        {% endif %}
    </div>
</body>
</html>
