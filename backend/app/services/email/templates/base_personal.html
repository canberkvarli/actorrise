<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="margin:0; padding:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:15px; line-height:1.7; color:#1a1a1a;">
    <div style="max-width:540px; margin:0 auto; padding:32px 20px;">
        {% block content %}{% endblock %}
        {% if unsubscribe_url %}
        <div style="margin-top:36px; padding-top:16px; border-top:1px solid #eee; color:#999; font-size:13px; line-height:1.5;">
            i only send these to actors who actually want them. if that's not you anymore, <a href="{{ unsubscribe_url }}" style="color:#999; text-decoration:underline;">just say no</a> and i'll stop bothering you. no hard feelings, promise.
        </div>
        {% endif %}
    </div>
</body>
</html>
