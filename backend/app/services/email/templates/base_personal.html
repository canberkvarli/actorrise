<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 15px; line-height: 1.7; color: #1a1a1a;
            background-color: #ffffff;
        }
        .wrapper { max-width: 540px; margin: 0 auto; padding: 32px 20px; }
        p { margin: 0 0 16px; }
        a { color: #CB4B00; }
        .sig { margin-top: 28px; color: #555; font-size: 14px; line-height: 1.5; }
        .unsub { margin-top: 32px; font-size: 12px; color: #999; }
        .unsub a { color: #999; }
    </style>
</head>
<body>
    <div class="wrapper">
        {% block content %}{% endblock %}

        {% if unsubscribe_url %}
        <p class="unsub"><a href="{{ unsubscribe_url }}">Unsubscribe</a></p>
        {% endif %}
    </div>
</body>
</html>
