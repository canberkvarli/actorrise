<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}ActorRise{% endblock %}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        /* Reset */
        body, table, td, p, a, li { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0; mso-table-rspace: 0; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; display: block; }

        body {
            margin: 0; padding: 0; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px; line-height: 1.6; color: #292929; background-color: #f5f5f5;
        }

        .wrapper { width: 100%; background-color: #f5f5f5; padding: 32px 16px; }

        .container {
            max-width: 560px; margin: 0 auto; background-color: #ffffff;
            border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        /* Header */
        .header {
            background-color: #242424; padding: 40px 32px 36px; text-align: center;
        }
        .logo { max-width: 280px; height: auto; margin: 0 auto; }

        /* Optional sub-header (colored banner below logo) */
        .sub-header {
            padding: 24px 32px; text-align: center; color: #ffffff;
        }
        .sub-header h1 {
            margin: 0; font-size: 22px; font-weight: 700; color: #ffffff; line-height: 1.3;
        }

        /* Content */
        .content { padding: 28px 32px 36px; }
        .content h1 { font-size: 22px; font-weight: 700; color: #292929; margin: 0 0 20px; line-height: 1.3; }
        .content p { margin: 0 0 16px; color: #374151; }
        .content p.greeting { font-size: 17px; color: #292929; }
        .content strong { color: #292929; }

        /* Lists */
        .content ul { margin: 16px 0; padding: 0 0 0 20px; }
        .content li { padding: 6px 0; color: #374151; font-size: 15px; }

        /* Styled bullet list (no native bullets) */
        .steps { margin: 24px 0; padding: 0; list-style: none; }
        .steps li { padding: 10px 0; margin: 0; color: #374151; font-size: 15px; }
        .bullet { color: #CB4B00; margin-right: 8px; }

        /* CTA button */
        .cta-wrap { text-align: center; margin: 28px 0 24px; }
        .cta {
            display: inline-block; background-color: #CB4B00; color: #ffffff !important;
            padding: 14px 28px; border-radius: 10px; text-decoration: none;
            font-weight: 600; font-size: 15px; letter-spacing: 0.02em;
        }
        .cta:hover { background-color: #B03000; }

        /* Accent boxes */
        .accent-box {
            margin: 24px 0; padding: 20px 24px; border-radius: 12px;
        }
        .accent-box-orange { background-color: #fef7ed; border: 1px solid #fed7aa; }
        .accent-box-green { background-color: #f0fdf4; border: 1px solid #bbf7d0; }
        .accent-box-red { background-color: #fef2f2; border: 1px solid #fecaca; }
        .accent-box-yellow { background-color: #fffbeb; border: 1px solid #fde68a; }
        .accent-box-blue { background-color: #eff6ff; border: 1px solid #bfdbfe; }

        .accent-box p { font-size: 14px; line-height: 1.55; }
        .accent-box p:last-of-type { margin-bottom: 0; }
        .accent-box .accent-title {
            font-size: 15px; font-weight: 700; color: #292929; margin: 0 0 10px; letter-spacing: 0.02em;
        }

        /* Highlighted monologue block */
        .monologue-title {
            background: #fafafa; padding: 15px; border-left: 4px solid #CB4B00;
            margin: 20px 0; border-radius: 4px;
        }

        /* Signature */
        .signature { margin-top: 28px; color: #374151; }
        .signature strong { color: #292929; }

        /* Footer */
        .footer {
            background-color: #f9fafb; padding: 24px 32px; text-align: center;
            border-top: 1px solid #E0E0E0;
        }
        .footer p { margin: 0 0 8px; font-size: 13px; color: #616161; }
        .footer a { color: #CB4B00; text-decoration: none; }

        /* Links */
        a { color: #CB4B00; text-decoration: none; }

        @media only screen and (max-width: 600px) {
            .wrapper { padding: 20px 12px; }
            .header, .content, .sub-header { padding-left: 24px; padding-right: 24px; }
            .footer { padding-left: 24px; padding-right: 24px; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <img src="https://actorrise.com/logo_with_text.png" alt="ActorRise" width="280" class="logo" />
            </div>

            {% block sub_header %}{% endblock %}

            <div class="content">
                {% block content %}{% endblock %}
            </div>

            <div class="footer">
                <p>&copy; 2026 ActorRise. All rights reserved.</p>
                <p>
                    <a href="https://actorrise.com">actorrise.com</a>
                    &nbsp;&middot;&nbsp;
                    <a href="https://instagram.com/canberk.varli">instagram</a>
                    &nbsp;&middot;&nbsp;
                    <a href="https://x.com/canberkvarli">X</a>
                </p>
                {% if unsubscribe_url %}
                <p style="margin-top: 12px; font-size: 12px;">
                    <a href="{{ unsubscribe_url }}" style="color: #616161;">Unsubscribe from marketing emails</a>
                </p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
