{% extends "base.html" %}

{% block title %}New Upgrade Notification{% endblock %}

{% block content %}
                <h1>New Paid Subscriber!</h1>
                <p>A user just upgraded to a paid plan.</p>
                <div class="accent-box accent-box-green">
                    <table style="width:100%; border-collapse:collapse;">
                        <tr><td style="padding:6px 0; font-size:15px; font-weight:600; color:#292929; width:120px;">Name</td><td style="padding:6px 0; font-size:15px; color:#374151;">{{ user_name }}</td></tr>
                        <tr><td style="padding:6px 0; font-size:15px; font-weight:600; color:#292929; width:120px;">Email</td><td style="padding:6px 0; font-size:15px; color:#374151;">{{ user_email }}</td></tr>
                        <tr><td style="padding:6px 0; font-size:15px; font-weight:600; color:#292929; width:120px;">Tier</td><td style="padding:6px 0; font-size:15px; color:#374151;">{{ tier_display_name }}</td></tr>
                        <tr><td style="padding:6px 0; font-size:15px; font-weight:600; color:#292929; width:120px;">Billing</td><td style="padding:6px 0; font-size:15px; color:#374151;">{{ billing_period }}</td></tr>
                        <tr><td style="padding:6px 0; font-size:15px; font-weight:600; color:#292929; width:120px;">Time</td><td style="padding:6px 0; font-size:15px; color:#374151;">{{ timestamp }}</td></tr>
                    </table>
                </div>
{% endblock %}
